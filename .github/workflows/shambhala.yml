# This workflow fetches new Shambhala schedule data and commit and changes back to the repo

name: Shambhala schedule updates

env:
  FESTIVAL_YEAR: 2026
  FESTIVAL_DATA_PATH: festivals/shambhalafestival
  CLASHFINDER_NAME: smf2026

on:
  workflow_dispatch:
    inputs:
      upload_clashfinder:
        description: Upload Clashfinder after build, even if clashfinder.txt did not change
        required: false
        default: false
        type: boolean
  # This only runs on default branch
  schedule:
    - cron: "12 */6 * 6 *"      # At minute 12 past every 6th hour in June.
    - cron: "12 */6 1-23 7 *"   # At minute 12 past every 6th hour on every day-of-month from 1 through 23 in July.

  push:
    branches:
      - "main"
      - "gh-automation" ## For testing/development

permissions:
    # Give the default GITHUB_TOKEN write permission to commit and push the
    # added or changed files to the repository.
    contents: write

jobs:
  # GitHub's cron syntax has no year field, so gate every trigger here.
  check_year:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.year.outputs.should_run }}
    steps:
    - name: Check festival year
      id: year
      run: |
        if [[ "$(date -u +%Y)" == "${FESTIVAL_YEAR}" ]]; then
          echo "should_run=true" >> "${GITHUB_OUTPUT}"
        else
          echo "should_run=false" >> "${GITHUB_OUTPUT}"
        fi

  build:
    needs: check_year
    if: needs.check_year.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      clashfinder_changed: ${{ steps.clashfinder_data.outputs.changed }}
      build_commit: ${{ steps.build_commit.outputs.sha }}
    steps:
    - uses: actions/checkout@main
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Install the project
      run: uv sync --locked --all-extras --dev
    -  name: Write secrets to .env file
       run: |
        cat << EOF > "${FESTIVAL_DATA_PATH}/.env"
        SESSION_KEY=${{ secrets.SHAMBHALA_SESSION_KEY }}
        EOF
    - name: Fetch latest schedule data from API
      run: |
        pushd "${FESTIVAL_DATA_PATH}"
        "./${FESTIVAL_YEAR}.sh"
        popd
    - name: Transform data into clashfinder text format
      run: |
        uv run ./bin/appmiral_transform.py --tz "US/Pacific" --artists "${FESTIVAL_DATA_PATH}/${FESTIVAL_YEAR}/shambhalafestival.artists.json" --stages "${FESTIVAL_DATA_PATH}/${FESTIVAL_YEAR}/shambhalafestival.stages.json" > "${FESTIVAL_DATA_PATH}/${FESTIVAL_YEAR}/clashfinder.txt"
    - uses: stefanzweifel/git-auto-commit-action@v7
      id: auto_commit
      with:
        commit_message: Automated Shambhala festival data update
        file_pattern: '*.json *.txt'
    - name: Check whether Clashfinder data changed
      id: clashfinder_data
      run: |
        if [[ "${{ steps.auto_commit.outputs.changes_detected }}" != "true" ]]; then
          echo "changed=false" >> "${GITHUB_OUTPUT}"
        elif git diff --quiet HEAD^ HEAD -- "${FESTIVAL_DATA_PATH}/${FESTIVAL_YEAR}/clashfinder.txt"; then
          echo "changed=false" >> "${GITHUB_OUTPUT}"
        else
          echo "changed=true" >> "${GITHUB_OUTPUT}"
        fi
    - name: Capture build commit
      id: build_commit
      run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

  upload_clashfinder:
    needs: build
    if: needs.build.outputs.clashfinder_changed == 'true' || (github.event_name == 'workflow_dispatch' && inputs.upload_clashfinder)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
      with:
        ref: ${{ needs.build.outputs.build_commit }}
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Install the project
      run: uv sync --locked --all-extras --dev
    - name: Upload Clashfinder data
      env:
        CLASHFINDER_COOKIE: ${{ secrets.CLASHFINDER_COOKIE }}
      run: |
        uv run ./bin/clashfinder.py \
          --name "${CLASHFINDER_NAME}" \
          --path "${FESTIVAL_DATA_PATH}/${FESTIVAL_YEAR}/clashfinder.txt"
